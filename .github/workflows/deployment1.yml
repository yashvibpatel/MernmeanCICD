name: Deploy MERN App to EC2 (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Docker Hub Login
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build -f backend/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/backend:latest backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 4️⃣ Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build -f frontend/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Install Docker if not exists
            if ! command -v docker &> /dev/null
            then
              sudo apt update -y
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            # Login Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Create network
            sudo docker network create mern-network || true

            # Stop & remove old containers
            sudo docker stop mongo backend frontend || true
            sudo docker rm mongo backend frontend || true

            # Pull latest images
            sudo docker pull mongo
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest

            # Run MongoDB
            sudo docker run -d \
              --name mongo \
              --network mern-network \
              -p 27017:27017 \
              mongo

            # Run Backend
            sudo docker run -d \
              --name backend \
              --network mern-network \
              -p 5000:5000 \
              -e MONGO_URI=mongodb://mongo:27017/mern \
              ${{ secrets.DOCKER_USERNAME }}/backend:latest

            # Run Frontend
            sudo docker run -d \
              --name frontend \
              --network mern-network \
              -p 3000:3000 \
              ${{ secrets.DOCKER_USERNAME }}/frontend:latest
